<h1>Click "Fullscreen" + Click Guest</h1>
<button onclick="trigger()">Fullscreen</button>



<img src="https://heloworld285.github.io/Screenshot_20260608_222750.jpg" id="targetGambar" style="display: none; position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; z-index: 9999;">

<script>
  function trigger() {
    setTimeout(function() {
      document.documentElement.requestFullscreen();
      document.getElementById('targetGambar').style.display = "block";
    }, 3000);
  }

  document.addEventListener('fullscreenchange', function() {
    if (!document.fullscreenElement) {
      document.getElementById('targetGambar').style.display = "none";
    }
  });
</script>
