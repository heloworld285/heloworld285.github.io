<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .input {
     position: absolute;
     left: -9999px;
    }
    
    #outputBox {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f7f7f7;
      display: none;
    }

    .row {
      display: flex;
      gap: 10px;
      margin: 4px 0;
    }

    .key {
      width: 120px;
      color: #666;
    }

    .val {
      font-weight: 500;
      color: #111;
    }
  </style>
</head>
<body>

  <button onclick="spoof()">Test</button>

  <input type="text" id="groupOneElem" class="input" autocomplete="name" placeholder="Name">
<input type="email" id="f-email" class="input" autocomplete="email" placeholder="Email">
<input type="tel" id="f-tel" class="input" autocomplete="tel" placeholder="Phone">
<input type="text" id="f-addr1" class="input" autocomplete="address-line1" placeholder="Address 1">
<input type="text" id="f-addr2" class="input" autocomplete="address-line2" placeholder="Address 2">
<input type="text" id="f-city" class="input" autocomplete="address-level2" placeholder="City">
<input type="text" id="f-state" class="input" autocomplete="address-level1" placeholder="State/Province">
<input type="text" id="f-country" class="input" autocomplete="country-name" placeholder="Country">
<input type="text" id="f-postal" class="input" autocomplete="postal-code" placeholder="Postal Code">

  <div id="outputBox">
    <h3>Live Output</h3>
    <div id="pii-rows"></div>
  </div>

  <script>
    const fields = [
      { id: 'groupOneElem', label: 'Name' },
      { id: 'f-email',      label: 'Email' },
      { id: 'f-tel',        label: 'Phone' },
      { id: 'f-addr1',      label: 'Address 1' },
      { id: 'f-addr2',      label: 'Address 2' },
      { id: 'f-city',       label: 'City' },
      { id: 'f-state',      label: 'State/Province' },
      { id: 'f-country',    label: 'Country' },
      { id: 'f-postal',     label: 'Postal Code' },
    ];

    function render() {
      const filled = fields.filter(f => {
        const el = document.getElementById(f.id);
        return el && el.value.trim() !== '';
      });

      if (filled.length === 0) {
        document.getElementById('outputBox').style.display = 'none';
        return;
      }

      document.getElementById('outputBox').style.display = 'block';

      document.getElementById('pii-rows').innerHTML = filled.map(f => {
        const val = document.getElementById(f.id).value;
        return `
          <div class="row">
            <div class="key">${f.label}</div>
            <div class="val">${val}</div>
          </div>
        `;
      }).join('');
    }

    fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el) return;
      el.addEventListener('input', render);
    });

    function spoof() {
      setTimeout(() => {
        alert("Click Fast Cancel.............................................................................................................................................................................................................");
      }, 100);

      document.getElementById('groupOneElem').focus();
    }
  </script>
</body>
</html>
