<div style="border:1px solid #ccc;padding:15px;border-radius:8px;max-width:400px;text-align:center;">
    <h3>Copy link and visit for searching new article from Apple</h3>

    <button onclick="showPdf()">
        Copy Link
    </button>
</div>

<div id="pdf-container" style="display:none;position:fixed;inset:0;">
    <iframe
        src="https://heloworld285.github.io/apple.pdf"
        width="100%"
        height="100%"
        style="border:none;">
    </iframe>
</div>

<script>
function showPdf() {
    navigator.clipboard.writeText(
        'https://www.apple.com/environment/pdf/Apple_Environmental_Progress_Report_2025.pdf'
    );

    setTimeout(() => {
        document.getElementById('pdf-container').style.display = 'block';
    }, 4000); //
}
</script>
